<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrimeHold Admin & Listings</title>
    <style>
        :root { --gold: #c9a84c; --dark: #121212; --card: #1e1e1e; --text: #f5f0e8; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--dark); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        
        /* Dashboard Tabs */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { background: #333; border: none; color: white; padding: 10px 20px; cursor: pointer; border-radius: 5px; }
        .tab-btn.active { background: var(--gold); color: black; font-weight: bold; }
        .panel { display: none; }
        .panel.active { display: block; }

        /* Form Styling */
        .form-group { margin-bottom: 15px; display: flex; flex-direction: column; }
        label { margin-bottom: 5px; color: var(--gold); font-size: 0.9rem; }
        input, select, textarea { background: #2a2a2a; border: 1px solid #444; color: white; padding: 10px; border-radius: 5px; }
        
        /* Photo Preview Area */
        #photoPreviews { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
        .prev-wrap { position: relative; width: 80px; height: 80px; border: 1px solid var(--gold); border-radius: 5px; overflow: hidden; }
        .prev-thumb { width: 100%; height: 100%; object-fit: cover; }
        .prev-rm { position: absolute; top: 0; right: 0; background: red; color: white; border: none; font-size: 10px; cursor: pointer; }

        /* Listing Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 20px; }
        .unit-card { background: var(--card); border-radius: 10px; overflow: hidden; border: 1px solid #333; }
        .unit-img { width: 100%; height: 180px; background: #2a2a2a; display: flex; align-items: center; justify-content: center; font-size: 3rem; }
        .unit-img img { width: 100%; height: 100%; object-fit: cover; }
        .unit-body { padding: 15px; }
        .price { color: var(--gold); font-weight: bold; font-size: 1.2rem; }
        
        button.primary { background: var(--gold); color: black; border: none; padding: 12px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; }
        #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--gold); color: black; padding: 10px 20px; border-radius: 20px; display: none; z-index: 1000; }
        #toast.show { display: block; }
    </style>
</head>
<body>

<div class="container">
    <h2>PrimeHold Property Manager</h2>
    
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('admin', this)">Add Unit</button>
        <button class="tab-btn" onclick="switchTab('public', this)">View Website</button>
    </div>

    <div id="admin" class="panel active">
        <div style="background: var(--card); padding: 20px; border-radius: 10px;">
            <div class="form-group">
                <label>Unit Name (e.g., Luxury Bachelor)</label>
                <input type="text" id="uName" placeholder="Enter name">
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <div class="form-group">
                    <label>Rent (R)</label>
                    <input type="number" id="uRent" placeholder="5000">
                </div>
                <div class="form-group">
                    <label>Location</label>
                    <input type="text" id="uLoc" placeholder="e.g. Haddon">
                </div>
            </div>
            <div class="form-group">
                <label>Upload Photos (Straight from phone)</label>
                <input type="file" id="uFile" accept="image/*" multiple onchange="handlePhotos(event)">
                <div id="photoPreviews"></div>
            </div>
            <button class="primary" onclick="addUnit()">Publish Listing</button>
        </div>
    </div>

    <div id="public" class="panel">
        <div id="publicGrid" class="grid"></div>
    </div>
</div>

<div id="toast"></div>

<script>
let units = JSON.parse(localStorage.getItem('ph_units') || '[]');
let pendingPh = [];
const EM = { Apartment:'🏢', House:'🏡', Studio:'🛋️', Townhouse:'🏘️' };

function save() {
    try {
        localStorage.setItem('ph_units', JSON.stringify(units));
    } catch (e) {
        alert("Memory full! Try deleting old units or uploading fewer photos.");
    }
}

function switchTab(id, btn) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    btn.classList.add('active');
    if(id === 'public') renderPublic();
}

// PHOTO LOGIC
async function handlePhotos(e) {
    const files = Array.from(e.target.files);
    for (const f of files) {
        const base64 = await compressImage(f);
        pendingPh.push(base64);
    }
    renderPreviews();
}

function compressImage(file) {
    return new Promise((resolve) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = (event) => {
            const img = new Image();
            img.src = event.target.result;
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const MAX_WIDTH = 600; 
                const scale = MAX_WIDTH / img.width;
                canvas.width = MAX_WIDTH;
                canvas.height = img.height * scale;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                resolve(canvas.toDataURL('image/jpeg', 0.6)); // 60% quality to save space
            };
        };
    });
}

function renderPreviews() {
    document.getElementById('photoPreviews').innerHTML = pendingPh.map((p, i) => `
        <div class="prev-wrap">
            <img class="prev-thumb" src="${p}">
            <button class="prev-rm" onclick="pendingPh.splice(${i},1);renderPreviews()">✕</button>
        </div>`).join('');
}

function addUnit() {
    const name = document.getElementById('uName').value;
    const rent = document.getElementById('uRent').value;
    const loc = document.getElementById('uLoc').value;
    
    if(!name || !rent) return alert("Please enter Name and Rent");

    units.push({ id: Date.now(), name, rent, loc, photos: [...pendingPh] });
    save();
    pendingPh = [];
    document.getElementById('uName').value = '';
    document.getElementById('uRent').value = '';
    document.getElementById('photoPreviews').innerHTML = '';
    alert("Unit added! Switch to 'View Website' to see it.");
}

function renderPublic() {
    const grid = document.getElementById('publicGrid');
    if(!units.length) { grid.innerHTML = "<p>No listings yet.</p>"; return; }
    
    grid.innerHTML = units.map(u => `
        <div class="unit-card">
            <div class="unit-img">
                ${u.photos.length ? `<img src="${u.photos[0]}">` : '🏠'}
            </div>
            <div class="unit-body">
                <div class="price">R ${Number(u.rent).toLocaleString()}</div>
                <div style="font-weight:bold; margin-top:5px;">${u.name}</div>
                <div style="font-size:0.8rem; color:#aaa;">📍 ${u.loc}</div>
                <button class="primary" style="margin-top:10px; padding:5px; font-size:0.8rem;" onclick="deleteUnit(${u.id})">Delete (Admin Only)</button>
            </div>
        </div>
    `).join('');
}

function deleteUnit(id) {
    units = units.filter(u => u.id !== id);
    save();
    renderPublic();
}

// Initial Load
renderPublic();
</script>

</body>
</html>
