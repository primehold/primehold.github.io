<script>
// STATE
let units     = JSON.parse(localStorage.getItem('ph_units') || '[]');
let enquiries = JSON.parse(localStorage.getItem('ph_enq')   || '[]');
let pawnReqs  = JSON.parse(localStorage.getItem('ph_pawn')  || '[]');
let pendingPh = [];
let curUnit   = null;
let lbPh = [], lbIdx = 0;
const EM = { Apartment:'🏢', House:'🏡', Studio:'🛋️', Townhouse:'🏘️', Commercial:'🏬' };

function save() {
  localStorage.setItem('ph_units', JSON.stringify(units));
  localStorage.setItem('ph_enq',   JSON.stringify(enquiries));
  localStorage.setItem('ph_pawn',  JSON.stringify(pawnReqs));
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3500);
}

function switchTab(id, btn) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  btn.classList.add('active');
}

// PHOTOS — Cloudinary upload
const CLOUD_NAME = 'ducjsgjji'; // Fixed to your correct cloud name
const UPLOAD_PRESET = 'primehold_uploads';

async function uploadToCloudinary(file) {
  const fd = new FormData();
  fd.append('file', file);
  fd.append('upload_preset', UPLOAD_PRESET);
  fd.append('cloud_name', CLOUD_NAME);
  const res = await fetch('https://api.cloudinary.com/v1_1/' + CLOUD_NAME + '/image/upload', {
    method: 'POST',
    body: fd
  });
  if (!res.ok) throw new Error('Server error ' + res.status);
  const data = await res.json();
  if (!data.secure_url) throw new Error(data.error ? data.error.message : 'No URL returned');
  return data.secure_url;
}

async function handlePhotos(e) {
  const files = Array.from(e.target.files);
  if (!files.length) return;
  const left = 8 - pendingPh.length;
  if (files.length > left) toast('⚠️ Max 8 photos per unit');
  const toUpload = files.slice(0, left);
  toast('⏳ Uploading ' + toUpload.length + ' photo(s)...');
  let success = 0;
  for (const f of toUpload) {
    try {
      const url = await uploadToCloudinary(f);
      pendingPh.push(url);
      renderPreviews();
      success++;
    } catch (err) {
      console.error('Upload error:', err);
      toast('❌ Failed to upload ' + f.name + '. Check Cloudinary preset.');
    }
  }
  if (success > 0) toast('✅ ' + success + ' photo(s) uploaded successfully!');
  e.target.value = '';
}

function renderPreviews() {
  document.getElementById('photoPreviews').innerHTML = pendingPh.map((s, i) => `
    <div class="prev-wrap">
      <img class="prev-thumb" src="${s}" alt="">
      <button class="prev-rm" onclick="rmPhoto(${i})">✕</button>
    </div>`).join('');
}

function rmPhoto(i) { pendingPh.splice(i, 1); renderPreviews(); }
